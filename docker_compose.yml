version: '3'

services:
  # Container A: Headless Android 13 Engine
  android-core:
    image: redroid/redroid:13.0.0-latest
    container_name: android_core
    privileged: true
    volumes:
      - ./android_data:/data
    command:
      - androidboot.use_redroid_stream=1
      - redroid.gpu.mode=guest
    restart: unless-stopped

  # Container B: The Web Browser Screen Sync Player
  web-ui:
    image: shmayro/scrcpy-web:latest
    container_name: android_web_ui
    depends_on:
      - android-core
    network_mode: host
    command: sh -c "adb connect localhost:5555 && npm start"
    restart: unless-stopped

  # Container C: The Free Web Link Generator
  public-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare_network_tunnel
    depends_on:
      - web-ui
    network_mode: host
    command: tunnel --no-autoupdate run --url http://localhost:8000
    restart: unless-stopped
