name: Permanent Android TV Server
on:
  workflow_dispatch:

jobs:
  run-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Layout-Aligned Android Emulator
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils
          
          echo "Starting Aligned Screen Layout..."
          # Fix Breakdowns:
          # -e DEVICE_RES="1280x800": Standardizes the desktop width canvas.
          # -screen 0 1280x800x24: Explicitly forces the underlying Linux display server to lock resolution.
          # -e SKIN="none": Prevents phone borders from stretching or breaking the screen pixels.
          docker run -d -p 6080:6080 \
            -e WEB_VNC=true \
            -e DEVICE_RES="1280x800" \
            -e SKIN="none" \
            -e VNC_EXTRA_ARGS="-screen 0 1280x800x24" \
            -e EMULATOR_ARGS="-gpu swiftshader_indirect -no-audio -no-window -尊-hw-config" \
            --device /dev/kvm \
            --name android-tv budtmo/docker-android:emulator_11.0

      - name: Start Free Pinggy Loop
        run: |
          while true; do
            echo "========================================================="
            echo "USE YOUR COMPLETED FIXED LINK BELOW:"
            echo "========================================================="
            
            ssh -p 443 \
                -o StrictHostKeyChecking=no \
                -o ServerAliveInterval=15 \
                -o ServerAliveCountMax=3 \
                -R0:localhost:6080 a.pinggy.io || true
                
            sleep 10
          done
