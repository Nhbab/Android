name: GTV14 Android TV (Live 1 Hour noVNC)

on:
  workflow_dispatch:

jobs:
  run-1hour-tv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU, noVNC, and Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils wget adb novnc websockify netcat-openbsd

      - name: Download GTV14 Android TV ISO
        run: |
          echo "Downloading ISO using browser bypass..."
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -o gtv14_atv.iso \
            "https://sourceforge.net"

      - name: Provision Storage Drive
        run: |
          qemu-img create -f qcow2 gtv14_disk.qcow2 12G

      - name: Launch GTV14 in QEMU (Headless VNC Server)
        run: |
          echo "Starting QEMU..."
          sudo qemu-system-x86_64 \
            -enable-kvm \
            -cpu host \
            -m 4G \
            -smp 2 \
            -drive file=gtv14_disk.qcow2,format=qcow2 \
            -cdrom gtv14_atv.iso \
            -vga virtio \
            -display none \
            -vnc 127.0.0.1:0 \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::5555-:5555 \
            -monitor unix:qemu_control.sock,server,nowait \
            -daemonize

      - name: Skip GRUB Boot Menu Automatically
        run: |
          sleep 6
          echo "sendkey ret" | sudo nc -U qemu_control.sock

      - name: Start Websockify (VNC to WebSockets)
        run: |
          echo "Translating raw VNC data to HTML5 WebSockets on port 6080..."
          websockify --web /usr/share/novnc/ 6080 127.0.0.1:5900 &
          sleep 2

      - name: Generate Public Remote Link and Hold for 1 Hour
        run: |
          echo "================================================================"
          echo "CREATING ZERO-CONFIG NO-REGISTRATION PUBLIC REMOTING LINK..."
          echo "================================================================"
          
          # Spin up the public SSL tunnel pointing to the noVNC local network socket
          ssh -o StrictHostKeyChecking=no -R 80:localhost:6080 a.pinggy.io &
          
          # Allow 5 seconds for the connection handshake to print out
          sleep 5
          
          echo "================================================================"
          echo "--> INSTRUCTIONS TO VIEW YOUR ANDROID TV <--"
          echo "1. Look above in the log execution line for a URL ending in .pinggy.link"
          echo "2. Open that URL in your browser."
          echo "3. Click on the 'vnc.html' file on screen to see the Android TV screen live."
          echo "4. Use your computer's ARROW KEYS to steer the TV up/down/left/right!"
          echo "================================================================"
          
          # This forces the GitHub Action worker to sleep perfectly for exactly 60 minutes
          echo "VM is now locked open for 1 hour. Enjoy!"
          sleep 3600
