name: Ultimate Android TV ARM Emulator
on: 
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Maximize CPU Hardware Acceleration (KVM)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm

      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK Path
        uses: android-actions/setup-android@v3

      # FIXED CORE CRASH: Clears, forces channel lookups, and pulls the authentic image
      - name: Download Android TV Image
        run: |
          # 1. Update the SDK tools listing channel registry indices to sync available links
          sdkmanager --update
          
          # 2. Pull the canonical Android 11 Android TV system image asset
          sdkmanager "emulator" "system-images;android-30;android-tv;x86_64"

      - name: Build Virtual TV Hardware Profile
        run: |
          mkdir -p ~/.android/avd/CloudAVD.avd/
          
          # Sets up the custom smart TV specifications layout manually
          cat <<EOF > ~/.android/avd/CloudAVD.avd/config.ini
          hw.cpu.arch=x86_64
          hw.cpu.ncore=4
          hw.ramSize=4096
          hw.gpu.mode=host
          hw.gpu.enabled=yes
          vm.heapSize=512
          image.sysdir.1=system-images/android-30/android-tv/x86_64/
          tag.id=android-tv
          tag.display=Android TV
          hw.keyboard=yes
          hw.mainKeys=no
          hw.lcd.density=240
          hw.lcd.height=540
          hw.lcd.width=960
          EOF
          
          echo "path=/home/runner/.android/avd/CloudAVD.avd" > ~/.android/avd/CloudAVD.ini
          echo "target=android-30" >> ~/.android/avd/CloudAVD.ini

      - name: Install Secure Web Streamer (noVNC)
        run: |
          sudo apt-get update
          # Automatically ensures virtual x11 components map to global server bins cleanly
          sudo apt-get install -y xvfb x11vnc novnc websockify
          mkdir -p ~/.vnc

      - name: Start TV Engine & Secure Pinggy SSL Tunnel
        run: |
          # 1. Start a high-performance headless display server canvas layout
          Xvfb :1 -screen 0 960x540x16 &
          export DISPLAY=:1
          sleep 3
          
          # 2. Start a fast, direct VNC layer pipe binding
          x11vnc -display :1 -nopw -listen localhost -shared -forever &
          sleep 3
          
          # 3. FIXED: Map system proxy links to run novnc proxy tool directly without crashing
          python3 -m websockify --web /usr/share/novnc/ 6080 localhost:5900 &
          sleep 3
          
          # 4. FIXED BINARY PATH: Invokes the emulator from its exact global variables location path
          $ANDROID_HOME/emulator/emulator -avd CloudAVD -no-audio -no-boot-anim -accel on -gpu swiftshader_indirect -cores 4 -memory 4096 -qemu -cpu host &
          sleep 15
          
          # 5. Continuous execution loop triggers next run before timeout thresholds
          (sleep 21000 && gh workflow run "Ultimate Android TV ARM Emulator") & 

          # 6. Establish secure HTTPS routing using your hardcoded URL mapping configuration
          echo "=== CONNECTING ULTIMATE TV STREAM ==="
          while true; do
            ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=15 -R nhbabcloudtv99:80:localhost:6080 a.pinggy.io +nd +g || true
            sleep 5
          done
