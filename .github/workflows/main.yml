name: Cloud Phone Android TV
on:
  workflow_dispatch:

jobs:
  run-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Virtualization
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils

      - name: Launch Dockerify Cloud Phone
        run: |
          echo "Starting Unified Android Video Streaming Environment..."
          # This image runs the emulator and native streaming pipeline on port 8000 simultaneously
          docker run -d -p 8000:8000 \
            --privileged \
            --device /dev/kvm \
            -e DEVICE_RES="1280x720" \
            --name cloud-phone shmayro/dockerify-android:latest

      - name: Start Free Pinggy Video Loop
        run: |
          while true; do
            echo "========================================================="
            echo "OPEN THIS LINK TO SEE YOUR SMARTPHONE VIDEO ENGINES:"
            echo "========================================================="
            
            ssh -p 443 \
                -o StrictHostKeyChecking=no \
                -o ServerAliveInterval=15 \
                -o ServerAliveCountMax=3 \
                -R0:localhost:8000 a.pinggy.io || true
                
            sleep 10
          done
