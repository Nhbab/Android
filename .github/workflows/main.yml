name: GTV14 Google TV 1 Hour VM

on:
  workflow_dispatch:

jobs:
  run-1hour-gtv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU, noVNC, and Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils wget adb novnc websockify

      - name: Download GTV14 ISO (Clean Redirect Resolution)
        run: |
          echo "Downloading exact GTV14 MRDTeam ISO using clean redirect tracking..."
          # Strip dynamic tokens to force curl to resolve the absolute file payload natively
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -o GTV14-x86_64-MRDTeam-V26T-260520.iso \
            "https://sourceforge.net"

      - name: Provision System Hard Drive
        run: |
          qemu-img create -f qcow2 gtv14_disk.qcow2 16G

      - name: Launch GTV14 (SCSI Storage Bus Simulation)
        run: |
          echo "Launching QEMU with SCSI virtual controller mapping..."
          # Emulates a real SCSI storage interface to trick the hybrid bootloader into tracking partitions
          sudo qemu-system-x86_64 \
            -enable-kvm \
            -cpu host \
            -m 4G \
            -smp 2 \
            -device virtio-scsi-pci,id=scsi0 \
            -drive file=gtv14_disk.qcow2,format=qcow2,if=none,id=hd0 \
            -device scsi-hd,drive=hd0,bus=scsi0.0 \
            -drive file=GTV14-x86_64-MRDTeam-V26T-260520.iso,format=raw,if=none,id=cd0 \
            -device scsi-hd,drive=cd0,bus=scsi0.0,bootindex=1 \
            -vga virtio \
            -display none \
            -vnc 127.0.0.1:0 \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::5555-:5555 \
            -monitor telnet:127.0.0.1:4444,server,nowait \
            -daemonize

      - name: Automated GRUB Boot Key Injection
        run: |
          echo "Waiting 15 seconds for the hardware storage arrays to initialize..."
          sleep 15
          
          echo "Sending Return key via Python to auto-select the 'Live CD' menu entry..."
          python3 -c '
          import socket, time
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.connect(("127.0.0.1", 4444))
          time.sleep(0.5)
          s.sendall(b"\n\nsendkey ret\n")
          time.sleep(0.5)
          s.close()
          '
          echo "Boot command delivered cleanly."

      - name: Start Websockify (VNC to WebSockets)
        run: |
          websockify --web /usr/share/novnc/ 6080 127.0.0.1:5900 &
          sleep 2

      - name: Generate Public Remote Link and Hold for 1 Hour
        run: |
          echo "================================================================"
          echo "LAUNCHING AUTHENTICATED TUNNEL ENGINE OVER PORT 443..."
          echo "================================================================"
          
          # Stable web tunnel utilizing your custom registered profile token ID parameter
          ssh -o StrictHostKeyChecking=no -p 443 -R 80:localhost:6080 RPLfy23ckPE+80@a.pinggy.io > pinggy.log 2>&1 &
          
          sleep 10
          
          echo "================================================================"
          echo "--> YOUR ONLINE VIRTUAL MACHINE REMOTE DETAILS <--"
          echo "================================================================"
          
          grep -o 'https://[^ ]*\(pinggy.link\|pinggy.io\)' pinggy.log || cat pinggy.log
          
          echo ""
          echo "INSTRUCTIONS:"
          echo "1. Click the .pinggy.link URL printed directly above."
          echo "2. On the web page that opens, click on 'vnc.html'."
          echo "3. Use your computer keyboard ARROW KEYS to steer Up/Down/Left/Right!"
          echo "================================================================"
          
          sleep 3600
