name: 🚀 Build and Validate Online Phone

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-test:
    name: Validate Docker Engine Configurations
    runs-on: ubuntu-latest

    steps:
    # 1. Pull code straight down into the GitHub virtual runner workspace
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 2. Initialize a standard Docker environment context to verify syntax
    - name: Setup Docker and Compose Environment
      run: |
        docker --version
        docker compose version

    # 3. Perform a dry-run parse on your compose orchestration block
    - name: Verify Compose File Syntax Validation
      run: |
        docker compose config
        
