name: Permanent Android TV Server
on:
  workflow_dispatch:

jobs:
  run-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Raw Pixel Android Emulator
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils
          
          echo "Starting Raw Pixel Android Layout..."
          # Fix Breakdowns:
          # -depth 8: Drops the engine to simple 256 colors. This requires almost zero processing power.
          # -vnc :0: Forces a raw, uncompressed video framework stream.
          docker run -d -p 6080:6080 \
            -e WEB_VNC=true \
            -e DEVICE_RES="800x600" \
            -e SKIN="none" \
            -e VNC_EXTRA_ARGS="-depth 8 -rfbauth 0 -truecolour 0" \
            -e EMULATOR_ARGS="-gpu swiftshader_indirect -no-audio -disable-hw-config -no-window" \
            --device /dev/kvm \
            --name android-tv budtmo/docker-android:emulator_11.0

      - name: Start Free Pinggy Loop
        run: |
          while true; do
            echo "========================================================="
            echo "USE THE CLEAN LINK BELOW:"
            echo "========================================================="
            
            # Turned off SSH compression (-C removed) because raw 8-bit does not need it
            ssh -p 443 \
                -o StrictHostKeyChecking=no \
                -o ServerAliveInterval=15 \
                -o ServerAliveCountMax=3 \
                -R0:localhost:6080 a.pinggy.io || true
                
            sleep 10
          done
