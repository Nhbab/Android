name: Permanent Android TV Server
on:
  workflow_dispatch:

jobs:
  run-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Optimized Android Emulator
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils
          
          echo "Starting Artifact-Free Android Emulator..."
          # Added flags to fix graphics distortion:
          # DEVICE_RES: Lowers resolution to 1280x720 (reduces data tearing)
          # EMULATOR_ARGS: Disables hardware GL, forces stable software graphics rendering
          docker run -d -p 6080:6080 \
            -e WEB_VNC=true \
            -e DEVICE_RES="1280x720" \
            -e EMULATOR_ARGS="-gpu swiftshader_indirect -no-audio" \
            --device /dev/kvm \
            --name android-tv budtmo/docker-android:emulator_11.0

      - name: Start Free Pinggy Loop
        run: |
          while true; do
            echo "========================================================="
            echo "COPIED YOUR CLEAN LINK BELOW (VALID FOR 60 MINS):"
            echo "========================================================="
            
            ssh -p 443 \
                -o StrictHostKeyChecking=no \
                -o ServerAliveInterval=30 \
                -o ServerAliveCountMax=3 \
                -R0:localhost:6080 a.pinggy.io || true
                
            echo "Limit reached. Generating new link..."
            sleep 10
          done
