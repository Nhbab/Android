name: Nexus Player Android TV 9 (1 Hour VM)

on:
  workflow_dispatch:

jobs:
  run-nexus-player:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU, noVNC, and Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils wget adb novnc websockify

      - name: Grant Runner Access to KVM Hardware Extensions
        run: |
          echo "Applying system group rules to bypass KVM kernel permissions..."
          sudo usermod -aG kvm $USER
          sudo chown $USER /dev/kvm

      - name: Download Android TV 9 ISO (Escape Brackets Bypass)
        run: |
          echo "Pulling clean direct 1.2GB ISO payload from Internet Archive servers..."
          curl -L -A "Mozilla/5.0" \
            -o "AndroidTV9-x64.iso" \
            "https://archive.org/download/androidtv-x86/AndroidTV9-x64-k5.18.0-arm-gapps-wifi6-%2807.02.23%29.iso"

      - name: Launch Android TV 9 (Native ISO Boot Mode)
        run: |
          echo "Starting QEMU container via native optical drive mapping to prevent boot freezes..."
          # Uses full standard CPU flags matching the Intel Atom layout requirement of the Nexus Player architecture
          qemu-system-x86_64 \
            -enable-kvm \
            -cpu Westmere,+ssse3,+sse4.1,+sse4.2,+popcnt,aes=on \
            -m 6G \
            -smp 4,cores=4,threads=1 \
            -drive file="AndroidTV9-x64.iso",media=cdrom,format=raw \
            -boot order=d \
            -vga std \
            -device virtio-mouse-pci \
            -device virtio-keyboard-pci \
            -display none \
            -audio none \
            -vnc 127.0.0.1:0 \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::5555-:5555 \
            -monitor telnet:127.0.0.1:4444,server,nowait \
            -daemonize

      - name: Automated GRUB True-Color Video Override Macro
        run: |
          echo "Waiting 12 seconds for the generic GRUB boot selection page to generate..."
          sleep 12
          
          echo "Injecting native layout overrides via QEMU control socket channel..."
          python3 -c '
          import socket, time
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.connect(("127.0.0.1", 4444))
          time.sleep(0.5)
          
          # Press "Tab" to open the interactive kernel boot parameters line editor window
          s.sendall(b"sendkey tab\n")
          time.sleep(0.5)
          
          # Inject spaces to separate our flags from the native build command variables
          s.sendall(b"sendkey spc\n")
          time.sleep(0.1)
          
          # Type "vga=788" string manually to clear the weird flipped color bug instantly in memory
          # Type "DATA=" to initialize the internal RAM layout wizard correctly
          # Type "quiet" to prevent logging congestion from slowing down our boot sequence
          boot_params = "vga=788 DATA= quiet"
          for char in boot_params:
              if char == " ":
                  s.sendall(b"sendkey spc\n")
              elif char == "=":
                  # Maps the correct system equal sign keycode parameter inside the QEMU shell monitor
                  s.sendall(b"sendkey kp_equals\n")
              else:
                  s.sendall(f"sendkey {char}\n".encode())
              time.sleep(0.05)
          
          time.sleep(0.5)
          # Hit Enter to boot directly into the true-color accelerated television workspace framework!
          s.sendall(b"sendkey ret\n")
          s.close()
          '
          echo "Macro sequence processed completely. Loading accelerated user desktop layout..."

      - name: Start Websockify (VNC to WebSockets)
        run: |
          websockify --web /usr/share/novnc/ 6080 127.0.0.1:5900 &
          sleep 2

      - name: Generate Public Remote Link and Hold for 1 Hour
        run: |
          echo "================================================================"
          echo "LAUNCHING AUTHENTICATED TUNNEL ENGINE OVER PORT 443..."
          echo "================================================================"
          
          ssh -o StrictHostKeyChecking=no -p 443 -R 80:localhost:6080 RPLfy23ckPE+80@a.pinggy.io > pinggy.log 2>&1 &
          
          sleep 10
          
          echo "================================================================"
          echo "--> YOUR ONLINE VIRTUAL MACHINE REMOTE DETAILS <--"
          echo "================================================================"
          
          grep -o 'https://[^ ]*\(pinggy.link\|pinggy.io\)' pinggy.log || cat pinggy.log
          
          echo ""
          echo "INSTRUCTIONS:"
          echo "1. Click the .pinggy.link URL printed directly above."
          echo "2. On the web page that opens, click on 'vnc.html'."
          echo "3. Use your computer keyboard ARROW KEYS to steer Up/Down/Left/Right!"
          echo "================================================================"
          
          sleep 3600
