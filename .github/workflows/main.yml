name: GTV14 Android TV VM (Fully Fixed)

on:
  workflow_dispatch:

jobs:
  run-gtv14-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU and Network Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils adb netcat-openbsd

      - name: Download GTV14 Android TV ISO (Browser Spoof)
        run: |
          echo "Downloading ISO with fake browser header to bypass 403 blocks..."
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -o gtv14_atv.iso \
            "https://downloads.sourceforge.net/project/androidtv-x86-64/GTV14/GTV14-x86_64-MRDTeam-V26T-260520.iso?ts=gAAAAABqNKI3177yBBdHqQsWOt747oDBhsLD_8oi50um_BIYhlvpXY_blf_fEW9bXND-RcAPRNp12tirUOZpsOrlnN_j_8GhKw%3D%3D&r=https%3A%2F%2Fsourceforge.net%2Fprojects%2Fandroidtv-x86-64%2Ffiles%2FGTV14%2FGTV14-x86_64-MRDTeam-V26T-260520.iso%2Fdownload"

      - name: Create System Hard Disk
        run: |
          qemu-img create -f qcow2 gtv14_disk.qcow2 12G

      - name: Launch QEMU (Headless Mode)
        run: |
          echo "Launching accelerated virtual machine in headless mode..."
          sudo qemu-system-x86_64 \
            -enable-kvm \
            -cpu host \
            -m 4G \
            -smp 2 \
            -drive file=gtv14_disk.qcow2,format=qcow2 \
            -cdrom gtv14_atv.iso \
            -vga virtio \
            -display none \
            -vnc 127.0.0.1:0 \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::5555-:5555 \
            -monitor unix:qemu_control.sock,server,nowait \
            -daemonize

      - name: Auto-Select GRUB Boot Option
        run: |
          echo "Waiting for GRUB boot menu initialization..."
          sleep 7
          echo "Sending Return keycode via root privilege socket connection..."
          echo "sendkey ret" | sudo nc -U qemu_control.sock

      - name: Deploy Live Debugging Terminal Link
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
