name: Android TV Web Remote (noVNC)

on:
  workflow_dispatch: # Cho phép bạn bấm nút "Run workflow" thủ công trên giao diện GitHub

jobs:
  run-tv-novnc:
    runs-on: macos-latest
    timeout-minutes: 120 # Máy ảo sẽ tự tắt sau 2 tiếng để bảo vệ tài nguyên của bạn

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Bước 1: Cài đặt TigerVNC (Thay thế hoàn hảo cho vnc4server đã lỗi thời)
    - name: Install TigerVNC
      run: |
        brew install tiger-vnc
        
    # Bước 2: Tải và thiết lập cấu hình noVNC mã nguồn mở
    - name: Install noVNC
      run: |
        git clone https://github.com $HOME/noVNC
        git clone https://github.com $HOME/noVNC/utils/websockify

    # Bước 3: Khởi chạy Máy ảo Android TV chạy ngầm
    - name: Launch Android TV Emulator
      uses: ReactiveCircus/android-emulator-runner@v2
      with:
        api-level: 30
        target: android-tv
        arch: x86_64
        profile: tv_1080p
        disable-animations: true
        emulator-options: -no-audio -no-boot-anim -camera-back none
        
        # Chúng ta khởi động VNC và giữ luồng kết nối ngay bên trong script chạy máy ảo
        script: |
          echo "==== Khởi động Android TV thành công ===="
          sleep 20
          
          # Thiết lập mật khẩu mặc định cho VNC là: 123456
          mkdir -p ~/.vnc
          echo "123456" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          # Chạy TigerVNC Server trên cổng :1 (Port hệ thống: 5901)
          vncserver :1 -geometry 1280x720 -depth 24
          
          # Khởi chạy noVNC để đổi cổng 5901 thành cổng Web công cộng 6080
          echo "==== Đang kích hoạt cổng noVNC HTML5 (Port 6080) ===="
          $HOME/noVNC/utils/novnc_proxy --vnc localhost:5901 --listen 6080 &
          sleep 5
          
          # Sử dụng giải pháp Tunnel miễn phí không cần tài khoản (Pinggy) để xuất cổng 6080 ra Internet
          echo "================================================================="
          echo "XEM LIÊN KẾT ĐƯỜNG TRUYỀN CÔNG CỘNG CỦA BẠN DƯỚI ĐÂY:"
          echo "================================================================="
          
          # Lệnh này sẽ mở cổng và giữ máy ảo luôn sống (Keep Alive)
          ssh -p 443 -R0:localhost:6080 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 a.pinggy.io
