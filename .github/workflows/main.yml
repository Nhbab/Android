name: Android TV 9 Fast 1 Hour VM

on:
  workflow_dispatch:

jobs:
  run-atv9-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU, noVNC, and Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils wget adb novnc websockify

      - name: Grant Runner Access to KVM Hardware Extensions
        run: |
          echo "Applying system group rules to bypass KVM kernel permissions..."
          sudo usermod -aG kvm $USER
          sudo chown $USER /dev/kvm

      - name: Download Android TV 9.iso (MediaFire Scraper Bypass)
        run: |
          echo "Downloading target Android TV 9.iso via deep carrier node headers..."
          # Generates an ephemeral session cookie jar block to trick MediaFire into allowing full data streams
          curl -L -b cookies.txt -c cookies.txt \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8" \
            -H "Accept-Language: en-US,en;q=0.9" \
            -H "Connection: keep-alive" \
            -H "Upgrade-Insecure-Requests: 1" \
            -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -o "Android TV 9.iso" \
            "https://download2440.mediafire.com/kn2g8os6mqhgA-5nGaO6Nrslwkyv44Al-3l5RaT1Cu159QUMcBzYKznn-FVTufCR2MJc0a5XbLValePbbbRjxyGtcxC4on5GTZyNrw3KsCzAXJBY3tOBGe41g77RwBUJq2gPLyaEcfCOJejFAdAIzABFZSXWJUvMLXwTw5uUpOw/yv3xktpoi74mf51/Android+TV+9.iso"

      - name: Verify ISO File Integrity and Size
        run: |
          echo "Verifying downloaded raw storage allocation data..."
          # Check this output line: it must read full Megabytes, matching your raw image file size!
          ls -lh "Android TV 9.iso"

      - name: Launch Android TV 9 in QEMU (Live Mode Accelerated)
        run: |
          echo "Starting accelerated QEMU container layout in Live Mode..."
          qemu-system-x86_64 \
            -enable-kvm \
            -cpu host \
            -m 6G \
            -smp 4,cores=4,threads=1 \
            -drive file="Android TV 9.iso",media=cdrom,format=raw \
            -boot order=d \
            -vga virtio \
            -display none \
            -audio none \
            -vnc 127.0.0.1:0 \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::5555-:5555 \
            -monitor telnet:127.0.0.1:4444,server,nowait \
            -daemonize

      - name: Fast Automated Live CD Boot Selection
        run: |
          echo "Waiting 12 seconds for the GRUB live boot options to process..."
          sleep 12
          
          echo "Injecting return key via Python socket interface to launch Live CD Mode..."
          python3 -c '
          import socket, time
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.connect(("127.0.0.1", 4444))
          time.sleep(0.5)
          s.sendall(b"sendkey ret\n")
          time.sleep(0.5)
          s.close()
          '
          echo "Boot command executed successfully. Android TV 9 is loading..."

      - name: Start Websockify (VNC to WebSockets)
        run: |
          websockify --web /usr/share/novnc/ 6080 127.0.0.1:5900 &
          sleep 2

      - name: Generate Public Remote Link and Hold for 1 Hour
        run: |
          echo "================================================================"
          echo "LAUNCHING AUTHENTICATED TUNNEL ENGINE OVER PORT 443..."
          echo "================================================================"
          
          ssh -o StrictHostKeyChecking=no -p 443 -R 80:localhost:6080 RPLfy23ckPE+80@a.pinggy.io > pinggy.log 2>&1 &
          
          sleep 10
          
          echo "================================================================"
          echo "--> YOUR ONLINE VIRTUAL MACHINE REMOTE DETAILS <--"
          echo "================================================================"
          
          grep -o 'https://[^ ]*\(pinggy.link\|pinggy.io\)' pinggy.log || cat pinggy.log
          
          echo ""
          echo "INSTRUCTIONS:"
          echo "1. Click the .pinggy.link URL printed directly above."
          echo "2. On the web page that opens, click on 'vnc.html'."
          echo "3. Use your computer keyboard ARROW KEYS to steer Up/Down/Left/Right!"
          echo "================================================================"
          
          sleep 3600
