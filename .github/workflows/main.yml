name: Run Android 16 Cloud VM
on: 
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  run-emulator:
    # Use macos-14 or macos-latest for Apple Silicon acceleration
    runs-on: macos-14 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install and Run Android 16 Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36        # API 36 corresponds to Android 16
          target: google_apis  # Includes official Google APIs
          arch: aarch64        # Use ARM64 architecture to match macOS-14 M-series chips
          profile: Pixel_8     # A modern profile compatible with Android 16 requirements
          script: |
            echo "Android 16 Virtual Machine is booted and running!"
            adb devices
            
            # Keep the VM alive for your tests (up to 6 hours max)
            # Change this number to control how long the machine stays running
            sleep 21600 
