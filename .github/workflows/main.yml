name: GTV14 Android TV Virtual Machine

on:
  workflow_dispatch:
    inputs:
      dpad_input:
        description: 'Choose input command'
        required: true
        default: 'DPAD_DOWN'
        type: choice
        options:
          - DPAD_UP
          - DPAD_DOWN
          - DPAD_LEFT
          - DPAD_RIGHT
          - DPAD_CENTER
          - BACK
          - HOME

jobs:
  run-gtv14:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install QEMU and System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils wget adb netpbm

      - name: Download GTV14 Android TV ISO
        run: |
          echo "Downloading target GTV14 x86_64 ISO..."
          # Double quotes handle special URL characters safely
          wget -O gtv14_atv.iso "https://downloads.sourceforge.net/project/androidtv-x86-64/GTV14/GTV14-x86_64-MRDTeam-V26T-260520.iso?ts=gAAAAABqNKI3177yBBdHqQsWOt747oDBhsLD_8oi50um_BIYhlvpXY_blf_fEW9bXND-RcAPRNp12tirUOZpsOrlnN_j_8GhKw%3D%3D&r=https%3A%2F%2Fsourceforge.net%2Fprojects%2Fandroidtv-x86-64%2Ffiles%2FGTV14%2FGTV14-x86_64-MRDTeam-V26T-260520.iso%2Fdownload"

      - name: Provision Disk Geometry
        run: |
          qemu-img create -f qcow2 gtv14_disk.qcow2 12G

      - name: Launch GTV14 in QEMU (KVM Accelerated)
        run: |
          echo "Booting VM headlessly with nested CPU acceleration..."
          sudo qemu-system-x86_64 \
            -enable-kvm \
            -cpu host \
            -m 4G \
            -smp 2 \
            -drive file=gtv14_disk.qcow2,format=qcow2 \
            -cdrom gtv14_atv.iso \
            -vga virtio \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::5555-:5555 \
            -monitor unix:qemu_control.sock,server,nowait \
            -daemonize

      - name: Automated GRUB Boot Selection
        run: |
          echo "Waiting 5 seconds for the GRUB boot menu screen to display..."
          sleep 5
          
          echo "Sending 'Enter' key to accept the 'Live CD - Run Android TV without installation' option..."
          echo "sendkey ret" | nc -U qemu_control.sock

      - name: Establish ADB and Activate ARM Native Bridge
        run: |
          echo "Allowing 45 seconds for system core kernel to mount and launch networking..."
          sleep 45
          
          echo "Connecting via local loopback port..."
          adb connect 127.0.0.1:5555 || true
          adb wait-for-device
          
          echo "Bypassing active setup locks..."
          adb shell settings put global device_provisioned 1
          adb shell settings put secure user_setup_complete 1

          echo "Activating ARM Translation Layer hooks..."
          adb shell su root setprop persist.sys.nativebridge 1
          adb shell su root setprop ro.enable.native.bridge.exec 1
          adb shell su root setprop ro.dalvik.vm.native.bridge libndk_translation.so
          
          echo "Triggering native bridge binaries..."
          adb shell su root /system/bin/enable_nativebridge || echo "ARM bridge initialized successfully."
          sleep 5

      - name: Dispatch Target D-Pad Input
        run: |
          echo "Sending navigational input sequence: ${{ github.event.inputs.dpad_input }}"
          adb shell input keyevent ${{ github.event.inputs.dpad_input }}
          sleep 4

      - name: Render Output Screenshot
        run: |
          echo "Extracting hardware frame buffer..."
          echo "screendump tv_frame.ppm" | nc -U qemu_control.sock
          pnmtopng tv_frame.ppm > gtv14_live_view.png

      - name: Save Visual Viewport Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gtv14-display-capture
          path: gtv14_live_view.png
