name: Ultimate Android TV ARM Emulator
on: 
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Maximize CPU Hardware Acceleration (KVM)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm

      # SỬ DỤNG CHÍNH XÁC LỆNH GỘP APT CỦA BẠN (Đã sửa bookworm thành stable để tương thích GitHub Server)
      - name: Install Ngrok via Custom APT Link Command
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null && echo "deb https://ngrok-agent.s3.amazonaws.com stable main" | sudo tee /etc/apt/sources.list.d/ngrok.list && sudo apt update && sudo apt install -y ngrok

      - name: Authenticate Ngrok
        run: ngrok config add-authtoken rd_3FJNUZLuxuKSUetomzVf2PqUeHX

      # Khởi chạy Android TV bằng Docker container cực mượt
      - name: Launch Docker Android TV Component
        run: |
          docker run -d -p 6080:6080 --device /dev/kvm --name android_tv \
            -e DEVICE="Android TV" \
            -e PACKAGE="system-images;android-30;android-tv;x86" \
            budtmo/docker-android:x86-11.0
          sleep 20

      - name: Start TV Engine & Permanent Ngrok Tunnel
        run: |
          (sleep 21000 && gh workflow run "Ultimate Android TV ARM Emulator") & 

          echo "=== CONNECTING TO FIXED NGROK DOMAIN ENGINE ==="
          while true; do
            ngrok http 6080 --domain=banister-reopen-savings.ngrok-free.dev --log=stdout || true
            sleep 5
          done
