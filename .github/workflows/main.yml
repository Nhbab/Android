name: Ultimate Android TV ARM Emulator
on: 
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure Cloud Kernel Virtualization (KVM)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm

      # DỌN DẸP SẠCH: Đảm bảo không trùng lặp bộ nhớ đệm thiết bị
      - name: Clean Existing Docker Containers Cache
        run: |
          docker stop $(docker ps -aq) || true
          docker rm -f $(docker ps -aq) || true
          docker network rm cloud_phone_net || true

      # HỆ THỐNG DOCKER KHÔNG LỆNH TẢI: Loại bỏ 100% wget/curl để triệt tiêu lỗi 23
      - name: Deploy Pure Docker Architecture
        run: |
          # 1. Tạo mạng ảo nội bộ
          docker network create cloud_phone_net
          
          sudo modprobe ashmem_linux || true
          sudo modprobe binder_linux || true
          
          # 2. CONTAINER LÕI: Chạy Android TV 11 nguyên bản ổn định
          docker run -d --privileged --name android_core \
            --network cloud_phone_net \
            --device /dev/kvm \
            redroid/redroid:11.0.0-latest \
            androidboot.hardware=redroid \
            androidboot.wlan.interface=wlan0 \
            redroid.width=1280 redroid.height=720 redroid.fps=30 redroid.density=320
            
          sleep 15
            
          # 3. CONTAINER ĐỒ HỌA: Kết nối VNC hiển thị trực tiếp màn hình gốc Android
          docker run -d --name web_canvas \
            --network cloud_phone_net \
            -p 6080:80 \
            -e ADB_HOST=android_core \
            -e VNC_PASSWORD=password123 \
            sorccu/adb-vnc-server
          
          sleep 10

          # 4. Kích hoạt kết nối cầu nối ADB nội bộ (Không tải bất kỳ file apk nào vào đĩa)
          docker exec -i web_canvas adb connect android_core:5555 || true
          sleep 5

          # 5. CONTAINER ĐƯỜNG TRUYỀN: Khởi chạy Ngrok truyền tải luồng tín hiệu
          docker run -d --name ngrok_agent \
            --network cloud_phone_net \
            ngrok/ngrok:latest \
            http web_canvas:80 --token=rd_3FJNUZLuxuKSUetomzVf2PqUeHX --domain=banister-reopen-savings.ngrok-free.dev

      - name: Maintain Server Runtime Loop
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Vòng lặp xoay vòng máy chủ 6 tiếng vô tận
          (sleep 21000 && gh workflow run "Ultimate Android TV ARM Emulator" || true) & 
          
          echo "=== PURE ANDROID TV DOCKER EMULATOR IS ONLINE ==="
          while true; do
            docker ps
            sleep 60
          done
