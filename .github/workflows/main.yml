name: Ultimate Android TV ARM Emulator
on: 
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure Cloud Kernel Virtualization (KVM)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm

      - name: Clean Existing Docker Containers Cache
        run: |
          docker stop $(docker ps -aq) || true
          docker rm -f $(docker ps -aq) || true

      # SỬA LỖI PULL DENIED: Dùng gói tổng hợp tích hợp sẵn Web VNC gốc công khai 100%
      - name: Deploy Unified Android TV & VNC Core
        run: |
          # Khởi chạy một Container duy nhất chứa cả hệ điều hành TV lẫn giao diện Web canvas trên cổng 6080
          docker run -d --privileged --name android_tv \
            --device /dev/kvm \
            -p 6080:6080 \
            -e DEVICE="Android TV" \
            -e PACKAGE="system-images;android-30;google_apis;x86_64" \
            budtmo/docker-android:x86-11.0
            
          # Đợi 25 giây để hệ thống Docker giải nén phân vùng đĩa ảo đám mây
          sleep 25

      # CONTAINER ĐƯỜNG TRUYỀN: Kích hoạt gói Ngrok liên kết thẳng vào cổng truyền hình ảnh 6080
      - name: Launch Ngrok Connection Agent
        run: |
          docker run -d --name ngrok_agent \
            --link android_tv:android_tv \
            ngrok/ngrok:latest \
            http android_tv:6080 --token=rd_3FJNUZLuxuKSUetomzVf2PqUeHX --domain=banister-reopen-savings.ngrok-free.dev

      - name: Maintain Server Runtime Loop
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Vòng lặp xoay vòng kích hoạt máy chủ lặp vô tận sau mỗi 5 tiếng 50 phút
          (sleep 21000 && gh workflow run "Ultimate Android TV ARM Emulator" || true) & 
          
          echo "=== PURE ANDROID TV DOCKER EMULATOR IS ONLINE ==="
          while true; do
            docker ps
            sleep 60
          done
