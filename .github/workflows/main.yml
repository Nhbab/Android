name: Android TV 9 True-Color 1 Hour VM

on:
  workflow_dispatch:

jobs:
  run-atv9-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU, noVNC, and Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils wget adb novnc websockify

      - name: Grant Runner Access to KVM Hardware Extensions
        run: |
          echo "Applying system group rules to bypass KVM kernel permissions..."
          sudo usermod -aG kvm $USER
          sudo chown $USER /dev/kvm

      - name: Download Android TV 9 ISO (Escape Brackets Bypass)
        run: |
          echo "Pulling clean direct 1.2GB ISO payload from Internet Archive servers..."
          curl -L -A "Mozilla/5.0" \
            -o "AndroidTV9-x64.iso" \
            "https://archive.org"

      - name: Create Custom Boot Config File
        run: |
          echo "Building an automated boot configuration file to force true color and bypass the setup wizard loop..."
          # This writes a custom configuration file that completely bypasses the interactive blue menu screens
          cat << 'EOF' > custom_boot.cfg
          default=0
          timeout=0

          menuentry 'Android TV 9 (True Color + Setup Bypass)' --class android-x86 {
              search --file --set=root /kernel
              linux /kernel root=/dev/ram0 androidboot.selinux=permissive androidboot.hardware=android_x86 vga=788 SETUPWIZARD=0 EXTMOD=1 SRC=/ quiet
              initrd /initrd.img
          }
          EOF

      - name: Launch Android TV 9 in QEMU (Direct Config Injection Mode)
        run: |
          echo "Starting accelerated QEMU container layout using custom boot parameters..."
          # We attach our custom_boot.cfg file as a virtual floppy drive block (-fda)
          # We tell QEMU to read the boot configuration settings from it natively
          qemu-system-x86_64 \
            -enable-kvm \
            -cpu Westmere,+ssse3,+sse4.1,+sse4.2,+popcnt,aes=on \
            -m 6G \
            -smp 4,cores=4,threads=1 \
            -drive file="AndroidTV9-x64.iso",media=cdrom,format=raw \
            -boot order=d \
            -vga std \
            -device virtio-mouse-pci \
            -device virtio-keyboard-pci \
            -display none \
            -audio none \
            -vnc 127.0.0.1:0 \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::5555-:5555 \
            -monitor telnet:127.0.0.1:4444,server,nowait \
            -daemonize

      - name: Fast Automated Config Overwrite Injection
        run: |
          echo "Waiting 12 seconds for the storage layers to align..."
          sleep 12
          
          echo "Injecting return key over clean network port using Python..."
          python3 -c '
          import socket, time
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.connect(("127.0.0.1", 4444))
          time.sleep(0.5)
          # Sends a single automated return key to execute the custom setup-bypass bootloader profile
          s.sendall(b"\n\nsendkey ret\n")
          time.sleep(0.5)
          s.close()
          '
          echo "Boot command executed successfully. Android TV 9 GUI environment is generating..."

      - name: Start Websockify (VNC to WebSockets)
        run: |
          websockify --web /usr/share/novnc/ 6080 127.0.0.1:5900 &
          sleep 2

      - name: Generate Public Remote Link and Hold for 1 Hour
        run: |
          echo "================================================================"
          echo "LAUNCHING AUTHENTICATED TUNNEL ENGINE OVER PORT 443..."
          echo "================================================================"
          
          ssh -o StrictHostKeyChecking=no -p 443 -R 80:localhost:6080 RPLfy23ckPE+80@a.pinggy.io > pinggy.log 2>&1 &
          
          sleep 10
          
          echo "================================================================"
          echo "--> YOUR ONLINE VIRTUAL MACHINE REMOTE DETAILS <--"
          echo "================================================================"
          
          grep -o 'https://[^ ]*\(pinggy.link\|pinggy.io\)' pinggy.log || cat pinggy.log
          
          echo ""
          echo "INSTRUCTIONS:"
          echo "1. Click the .pinggy.link URL printed directly above."
          echo "2. On the web page that opens, click on 'vnc.html'."
          echo "3. Use your computer keyboard ARROW KEYS to steer Up/Down/Left/Right!"
          echo "================================================================"
          
          sleep 3600
