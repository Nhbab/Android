name: Google TV 11 Fast 1 Hour VM

on:
  workflow_dispatch:

jobs:
  run-gtv11-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU, noVNC, and Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils wget adb novnc websockify

      - name: Grant Runner Access to KVM Hardware Extensions
        run: |
          echo "Applying system group rules to bypass KVM kernel permissions..."
          sudo usermod -aG kvm $USER
          sudo chown $USER /dev/kvm

      - name: Download GTV11 ISO from Google Drive (Tokenless Bypass)
        run: |
          echo "Downloading GTV11 ISO using Google Drive large file virus scan bypass..."
          python3 -c '
          import requests
          def download_file_from_google_drive(id, destination):
              URL = "https://google.com"
              session = requests.Session()
              response = session.get(URL, params={"id": id}, stream=True)
              token = None
              for key, value in response.cookies.items():
                  if key.startswith("download_warning"):
                      token = value
              if token:
                  params = {"id": id, "confirm": token}
                  response = session.get(URL, params=params, stream=True)
              save_response_content(response, destination)

          def save_response_content(response, destination):
              CHUNK_SIZE = 32768
              with open(destination, "wb") as f:
                  for chunk in response.iter_content(CHUNK_SIZE):
                      if chunk:
                          f.write(chunk)

          download_file_from_google_drive("1lXOoXZz_jhdpk1X5NTJBS3V-ZCMrEukC", "GTV11-x86_64-MRDTeam-V24-250622.iso")
          '

      - name: Verify ISO Download File Integrity
        run: |
          echo "Checking downloaded file size..."
          ls -lh "GTV11-x86_64-MRDTeam-V24-250622.iso"

      - name: Provision System Hard Drive
        run: |
          qemu-img create -f qcow2 gtv11_disk.qcow2 16G

      - name: Launch GTV11 (SATA HD/Hybrid Emulation Mode)
        run: |
          echo "Launching QEMU with a SATA hard disk structure to bypass hybrid boot blocks..."
          # Mounted as media=disk instead of cdrom to fix the "no bootable device" loop on MRDTeam builds
          qemu-system-x86_64 \
            -enable-kvm \
            -cpu host \
            -m 6G \
            -smp 4,cores=4,threads=1 \
            -drive file=gtv11_disk.qcow2,format=qcow2,index=0,media=disk \
            -drive file=GTV11-x86_64-MRDTeam-V24-250622.iso,format=raw,index=1,media=disk \
            -boot order=c,menu=on \
            -vga virtio \
            -display none \
            -audio none \
            -vnc 127.0.0.1:0 \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::5555-:5555 \
            -monitor telnet:127.0.0.1:4444,server,nowait \
            -daemonize

      - name: Automated GRUB Boot Key Injection (Live CD Mode)
        run: |
          echo "Waiting 12 seconds for the GRUB installation partition layout menu to initialize..."
          sleep 12
          
          echo "Injecting return key via Python socket interface to launch Live CD Mode..."
          python3 -c '
          import socket, time
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.connect(("127.0.0.1", 4444))
          time.sleep(0.5)
          # Fires Enter key onto the first entry: "Live CD - Run Google TV without installation"
          s.sendall(b"sendkey ret\n")
          time.sleep(0.5)
          s.close()
          '
          echo "Boot command executed successfully. Google TV 11 is loading..."

      - name: Start Websockify (VNC to WebSockets)
        run: |
          websockify --web /usr/share/novnc/ 6080 127.0.0.1:5900 &
          sleep 2

      - name: Generate Public Remote Link and Hold for 1 Hour
        run: |
          echo "================================================================"
          echo "LAUNCHING AUTHENTICATED TUNNEL ENGINE OVER PORT 443..."
          echo "================================================================"
          
          # Stable web tunnel utilizing your custom registered profile token ID parameter
          ssh -o StrictHostKeyChecking=no -p 443 -R 80:localhost:6080 RPLfy23ckPE+80@a.pinggy.io > pinggy.log 2>&1 &
          
          sleep 10
          
          echo "================================================================"
          echo "--> YOUR ONLINE VIRTUAL MACHINE REMOTE DETAILS <--"
          echo "================================================================"
          
          # Extract and print out your clickable secure web access url link
          grep -o 'https://[^ ]*\(pinggy.link\|pinggy.io\)' pinggy.log || cat pinggy.log
          
          echo ""
          echo "INSTRUCTIONS:"
          echo "1. Click the .pinggy.link URL printed directly above."
          echo "2. On the web page that opens, click on 'vnc.html'."
          echo "3. Use your computer keyboard ARROW KEYS to steer Up/Down/Left/Right!"
          echo "================================================================"
          
          # Keeps the workflow worker open for 60 full minutes
          sleep 3600
