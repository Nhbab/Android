name: 📱 Run Compose Phone on GitHub

on:
  workflow_dispatch: # 👈 Enables the run button on your phone screen

jobs:
  launch-compose:
    runs-on: ubuntu-latest # 👈 GitHub hosts this machine for free

    steps:
    - name: 📂 Pull Code Repo
      uses: actions/checkout@v4

    - name: 🛠️ Load Android Kernel Drivers
      run: |
        sudo modprobe binder_linux devices="binder,hwbinder,vndbinder" || true

    - name: 🚀 Start System with Docker Compose
      run: |
        # Force the runner to check if the file exists before starting
        ls -la
        docker compose -f ./docker-compose.yml up -d


    - name: 🌐 Print Public Web URL
      run: |
        echo "⏰ Waiting 10 seconds for initialization..."
        sleep 10
        echo "=========================================================="
        echo "👇 OPEN THIS WEBSITE LINK ON YOUR PHONE TO CONTROL IT:"
        echo "=========================================================="
        # Grabs the live running log frames out of your compose layout tunnel
        docker compose logs public-tunnel 2>&1 | grep -o 'https://.*\.trycloudflare\.com' | head -n 1
        
        # Holds the free session awake for 6 hours
        sleep 21600
