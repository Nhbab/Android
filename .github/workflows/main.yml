name: 📱 Run Compose Phone on GitHub

on:
  workflow_dispatch: # 👈 Lets you tap the run button from your phone screen

jobs:
  launch-compose:
    runs-on: ubuntu-latest

    steps:
    - name: 📂 Pull Code Repo
      uses: actions/checkout@v4
      with:
        path: Android # 👈 Forces GitHub to lock the path name safely

    - name: 🛠️ Load Android Kernel Drivers
      run: |
        sudo modprobe binder_linux devices="binder,hwbinder,vndbinder" || true

    - name: 🚀 Start System with Docker Compose
      run: |
        # 1. Force the runner to navigate inside your 'Android' repository folder
        cd Android
        
        # 2. Check the files to ensure docker-compose.yml is here
        ls -la
        
        # 3. Pull and launch your mobile core containers
        docker compose up -d

    - name: 🌐 Print Public Web URL
      run: |
        # Force the logger to look inside the active 'Android' repository directory
        cd Android
        
        echo "⏰ Waiting 10 seconds for initialization..."
        sleep 10
        echo "=========================================================="
        echo "👇 OPEN THIS WEBSITE LINK ON YOUR PHONE TO CONTROL IT:"
        echo "=========================================================="
        
        # Pulls your free live URL stream straight out of the active network container
        docker compose logs public-tunnel 2>&1 | grep -o 'https://.*\.trycloudflare\.com' | head -n 1
        
        # Keeps your GitHub action server hosting active for 6 hours
        sleep 21600
