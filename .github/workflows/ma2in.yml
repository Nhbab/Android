name: Android SDK TV 9 Ubuntu 1 Hour VM

on:
  workflow_dispatch:

jobs:
  run-sdk-tv-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU, noVNC, and Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils adb novnc websockify

      - name: Download Official Google Android TV 9 System Image
        run: |
          echo "Downloading un-throttled Android TV image package..."
          # Pulls the official compiled x86 system image zip package directly from Google repositories
          curl -L -o atv_image.zip "https://google.com"
          unzip atv_image.zip -d extracted_img/
          
          # Consolidate raw image system paths inside your workspace tracking directory
          cp extracted_img/x86/system.img .
          cp extracted_img/x86/userdata.img .
          cp extracted_img/x86/ramdisk.img .
          cp extracted_img/x86/kernel-ranchu-64 kernel_ranchu

      - name: Launch Android TV Image via Light-Weight QEMU
        run: |
          echo "Starting light-weight QEMU instance directly from Google image blocks..."
          # -cpu max: Emulates optimal instruction structures safely over unaccelerated cloud runners
          # Mounts Google's system and data images directly into standard storage drive arrays
          qemu-system-x86_64 \
            -cpu max \
            -m 4G \
            -smp 4 \
            -kernel kernel_ranchu \
            -initrd ramdisk.img \
            -append "root=/dev/ram0 androidboot.hardware=ranchu androidboot.selinux=permissive video=1280x720 DPI=160 quiet" \
            -drive file=system.img,format=raw,if=none,id=system \
            -device virtio-blk-pci,drive=system \
            -drive file=userdata.img,format=raw,if=none,id=userdata \
            -device virtio-blk-pci,drive=userdata \
            -vga std \
            -device virtio-mouse-pci \
            -device virtio-keyboard-pci \
            -display none \
            -vnc 127.0.0.1:0 \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::5555-:5555 \
            -daemonize

      - name: Apply Browser True-Color Patch into noVNC
        run: |
          echo "Injecting canvas color correction filter into noVNC page..."
          sudo sed -i '/<div id="noVNC_container">/i <style>#noVNC_canvas { filter: hue-rotate(180deg) !important; }</style>' /usr/share/novnc/vnc.html

      - name: Start Websockify (VNC to WebSockets)
        run: |
          websockify --web /usr/share/novnc/ --heartbeat 10 6080 127.0.0.1:5900 &
          sleep 2

      - name: Generate Public Remote Link and Hold for 1 Hour
        run: |
          echo "================================================================"
          echo "LAUNCHING AUTHENTICATED TUNNEL ENGINE OVER PORT 443..."
          echo "================================================================"
          
          ssh -o StrictHostKeyChecking=no -p 443 -R 80:localhost:6080 RPLfy23ckPE+80@a.pinggy.io > pinggy.log 2>&1 &
          
          sleep 10
          
          echo "================================================================"
          echo "--> YOUR GITHUB-HOSTED VIRTUAL MACHINE REMOTE DETAILS <--"
          echo "================================================================"
          
          grep -o 'https://[^ ]*\(pinggy.link\|pinggy.io\)' pinggy.log || cat pinggy.log
          
          echo ""
          echo "INSTRUCTIONS:"
          echo "1. Click the .pinggy.link URL printed directly above."
          echo "2. On the web page that opens, click on 'vnc.html'."
          echo "3. Use your computer keyboard ARROW KEYS to steer Up/Down/Left/Right!"
          echo "================================================================"
          
          sleep 3600
