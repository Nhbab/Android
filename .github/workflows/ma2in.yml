name: Android SDK TV 9 Native 1 Hour VM

on:
  workflow_dispatch:

jobs:
  run-sdk-tv:
    runs-on: macos-13 # macOS provides native hardware acceleration for the official Android emulator
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Android SDK Components and System Image
        run: |
          echo "Installing SDK Command Line Tools and native Android TV image..."
          # Accept licenses automatically
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null
          
          # Download Android TV 9 (API 28) x86_64 system image
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "system-images;android-28;android-tv;x86_64"
          
          # Create the Android Virtual Device (AVD) profiled as a large 720p TV
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd \
            --name "Android_TV_9" \
            --package "system-images;android-28;android-tv;x86_64" \
            --device "tv_720p" \
            --force

      - name: Install noVNC and Websockify
        run: |
          brew install novnc websockify

      - name: Launch Android SDK TV Emulator (Headless Mode)
        run: |
          echo "Starting native Android emulator at high performance speeds..."
          # Launches the official Android emulator headlessly with native VNC display mapping
          $ANDROID_HOME/emulator/emulator -avd "Android_TV_9" \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -vnc :0 \
            -accel on \
            -memory 4096 \
            -cores 4 \
            -daemonize

      - name: Start Websockify (VNC to WebSockets)
        run: |
          # Maps VNC framework port 5900 onto browser network port 6080
          websockify --web /opt/homebrew/share/novnc/ --heartbeat 10 6080 127.0.0.1:5900 &
          sleep 2

      - name: Generate Public Remote Link and Hold for 1 Hour
        run: |
          echo "================================================================"
          echo "LAUNCHING AUTHENTICATED TUNNEL ENGINE OVER PORT 443..."
          echo "================================================================"
          
          # Stable web tunnel utilizing your premium profile token code parameter
          ssh -o StrictHostKeyChecking=no -p 443 -R 80:localhost:6080 RPLfy23ckPE+80@a.pinggy.io > pinggy.log 2>&1 &
          
          sleep 10
          
          echo "================================================================"
          echo "--> YOUR ONLINE VIRTUAL MACHINE REMOTE DETAILS <--"
          echo "================================================================"
          
          # Extract and print out your clickable secure web access url link
          grep -o 'https://[^ ]*\(pinggy.link\|pinggy.io\)' pinggy.log || cat pinggy.log
          
          echo ""
          echo "INSTRUCTIONS:"
          echo "1. Click the .pinggy.link URL printed directly above."
          echo "2. On the web page that opens, click on 'vnc.html'."
          echo "3. Use your computer keyboard ARROW KEYS to steer Up/Down/Left/Right!"
          echo "================================================================"
          
          # Keeps the workflow worker open for 60 full minutes
          sleep 3600
