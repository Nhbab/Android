<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>nhbab Android TV Live Stream</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #0d0d0d;
            font-family: monospace; color: #00ffcc;
        }
        iframe {
            width: 100%; height: 100%; border: none; display: block;
        }
        .status-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center;
        }
    </style>
</head>
<body>

    <div class="status-container" id="statusBox">
        <h2>CONNECTING TO HARDCODED CLOUD PIPELINE...</h2>
        <p>Make sure you have clicked "Run workflow" in GitHub Actions.</p>
    </div>

    <iframe id="tvStream" src=""></iframe>

    <script>
        // Directly hooks into your server stream without needing GitHub secrets
        const streamUrl = "https://pinggy.link";
        
        const frame = document.getElementById('tvStream');
        const loader = document.getElementById('statusBox');

        frame.src = streamUrl;

        // Removes the text layout safely when the server feeds visual elements
        frame.onload = function() {
            loader.style.display = 'none';
        };
    </script>
</body>
</html>
