<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>nhbab Static Android WebAssembly</title>
    <style>
        /* Natural mobile application layout */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            font-family: system-ui, sans-serif;
        }
        /* Hidden canvas matrix where Android is visually drawn */
        #screen_container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .status-overlay {
            position: absolute;
            color: #ffffff;
            font-size: 16px;
            z-index: 10;
            text-align: center;
        }
    </style>
    <!-- Loads the pre-compiled WebAssembly x86 PC emulator engine -->
    <script src="https://copy.sh"></script>
</head>
<body>

    <div class="status-overlay" id="status_msg">Downloading Android OS to Browser Components...</div>
    
    <div id="screen_container">
        <canvas id="screen"></canvas>
    </div>

    <script>
        window.onload = function() {
            // Boot setup using an optimized lightweight Android-x86 image
            var emulator = new V86Starter({
                canvas: document.getElementById("screen"),
                wasm_path: "https://copy.sh",
                memory_size: 512 * 1024 * 1024, // Allocates 512MB RAM inside the sandbox
                vga_memory_size: 16 * 1024 * 1024,
                
                // Pure static Android live operating system image
                cdrom: {
                    url: "https://archive.org"
                },
                autostart: true
            });

            // Disables the text prompt once the system engine passes information to the canvas
            emulator.add_listener("screen-fill", function() {
                document.getElementById("status_msg").style.display = "none";
            });
        };
    </script>
</body>
</html>
