<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>nhbab Android TV Live Stream</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0d0d0d; font-family: monospace; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        .retry-status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ffcc; font-size: 16px; text-align: center; }
    </style>
</head>
<body>

    <div class="retry-status" id="statusMessage">CONNECTING TO STREAM DOMAIN... (Retrying automatically if offline)</div>
    <iframe id="tvStream" src=""></iframe>

    <script>
        const targetUrl = "banister-reopen-savings.ngrok-free.dev";
        const frame = document.getElementById('tvStream');
        const statusEl = document.getElementById('statusMessage');

        function loadStream() {
            frame.src = targetUrl;
        }

        // Fades loading dashboard elements once frames start rendering
        frame.onload = function() {
            statusEl.style.display = 'none';
        };

        // Self-Healing Trigger: Reloads if ngrok requires a few extra seconds to boot up
        setInterval(function() {
            try {
                if (frame.contentWindow.length === 0) {
                    loadStream();
                }
            } catch(e) {
                // Ignore security block errors
            }
        }, 5000);

        // Initial boot call
        loadStream();
    </script>
</body>
</html>
