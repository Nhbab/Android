<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Android 16 Interface</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0b0e14; color: #f0f6fc; text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        h1 { font-size: 1.6rem; margin: 0 0 5px 0; color: #c9d1d9; }
        .subtitle { font-size: 0.9rem; color: #8b949e; margin: 0 0 20px 0; }
        
        /* Smartphone Mockup Frame Layout */
        .phone-frame { width: 380px; height: 780px; border: 12px solid #21262d; border-radius: 48px; position: relative; background: #000; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7); overflow: hidden; }
        .phone-notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 140px; height: 25px; background: #21262d; border-bottom-left-radius: 18px; border-bottom-right-radius: 18px; z-index: 10; }
        
        /* The Interactive Android Viewport */
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 2; opacity: 0; transition: opacity 0.5s ease-in-out; background: #000; }
        iframe.active { opacity: 1; }

        /* Safe Fallback Boot Screen (Visible by Default) */
        .boot-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1; }
        .android-logo { width: 80px; height: 80px; margin-bottom: 25px; animation: pulse 2s infinite ease-in-out; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(56, 139, 253, 0.2); border-top: 4px solid #58a6ff; border-radius: 50%; animation: spin 1s linear infinite; }
        .boot-text { margin-top: 15px; font-size: 0.85rem; color: #58a6ff; letter-spacing: 1px; text-transform: uppercase; font-weight: bold; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.08); opacity: 1; } }
    </style>
</head>
<body>

    <h1>Android 16 Cloud Sandbox</h1>
    <p class="subtitle" id="infoText">Initializing framework communication components...</p>

    <div class="phone-frame">
        <div class="phone-notch"></div>
        
        <!-- Frame tag initialized without any 'src' attribute to prevent browser errors -->
        <iframe id="androidDisplay" allow="gamepad; keyboard"></iframe>
        
        <!-- CSS Boot screen covering the frame area -->
        <div class="boot-screen" id="fallbackBoot">
            <svg class="android-logo" viewBox="0 0 24 24" fill="#58a6ff"><path d="M16.5 12c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm-9 0c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm9.46-4.21l1.37-2.37c.1-.18.04-.41-.14-.51-.18-.1-.41-.04-.51.14l-1.4 2.42c-1.28-.58-2.71-.91-4.28-.91s-3 .33-4.28.91l-1.4-2.42c-.1-.18-.33-.24-.51-.14-.18.1-.24.33-.14.51l1.37 2.37C4.61 8.99 3 11.06 3 13.5h18c0-2.44-1.61-4.51-4.04-5.71z"/></svg>
            <div class="spinner"></div>
            <div class="boot-text" id="bootProgress">System Booting</div>
        </div>
    </div>

    <!-- Script file generated by your automated GitHub Actions Runner -->
    <script src="config.js"></script>
    <script>
        const iframeElement = document.getElementById('androidDisplay');
        const bootScreenElement = document.getElementById('fallbackBoot');
        const infoTextElement = document.getElementById('infoText');
        const bootProgressText = document.getElementById('bootProgress');

        // Check if the workflow script has successfully populated the configuration parameters
        if (typeof LIVE_VM_URL !== 'undefined' && LIVE_VM_URL !== "") {
            infoTextElement.innerText = "Connection verified. Synchronizing graphic displays.";
            bootProgressText.innerText = "Loading OS UI...";
            
            // Safely inject the live streaming target URL entirely via JavaScript
            const secureStreamUrl = LIVE_VM_URL + "/vnc.html?autoconnect=true&resize=scale&autoconnect=1&cursor=1";
            iframeElement.setAttribute('src', secureStreamUrl);
            
            // Unveil the interactive operating system panel once data loads fully
            iframeElement.onload = function() {
                iframeElement.classList.add('active');
                infoTextElement.innerText = "Android 16 Cloud Virtual Machine is Active.";
                setTimeout(() => { bootScreenElement.style.display = 'none'; }, 600);
            };
        } else {
            infoTextElement.innerText = "System engine is offline.";
            bootProgressText.innerText = "Workflow Idle";
            bootProgressText.style.color = "#f85149";
        }
    </script>
</body>
</html>
